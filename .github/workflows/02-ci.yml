name: CI Workflow with Secrets Matrix

on:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.11, 3.12]
        include:
          - python-version: 3.11
            DOCKER_TAG: docker-py311
            SECRET_VAR: ${{ secrets.SECRET_PY311 }}
          - python-version: 3.12
            DOCKER_TAG: docker-py312
            SECRET_VAR: ${{ secrets.SECRET_PY312 }}

    env:
      PY_VER: ${{ matrix.python-version }}
      IMAGE_TAG: ${{ matrix.DOCKER_TAG }}
      MY_SECRET: ${{ matrix.SECRET_VAR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VER }}

      - name: Show Python version
        run: python --version

      - name: Show secret (for demo, don't print real secrets!)
        run: echo "Secret for this job is $MY_SECRET"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: myapp:${{ env.IMAGE_TAG }}

      - name: Save Docker image as tar
        uses: docker/save-buildx-action@v2
        with:
          name: myapp-${{ env.IMAGE_TAG }}.tar
          image: myapp:${{ env.IMAGE_TAG }}

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp-${{ env.IMAGE_TAG }}
          path: myapp-${{ env.IMAGE_TAG }}.tar
          retention-days: 7