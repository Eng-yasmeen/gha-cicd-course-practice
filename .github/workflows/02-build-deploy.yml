name: Build & Deploy Workflow

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  build-and-deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: tiny-health-app
      IMAGE_TAG: run-${{ github.run_id }}
      AKS_NAMESPACE: demo
      AKS_DEPLOYMENT: tiny-health-app
      AKS_CONTAINER: tiny-health-app
      ACR_LOGIN_SERVER: example.azurecr.io

    steps:
      # Checkout
      - name: Check out repository
        uses: actions/checkout@v6

      # Setup Docker buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to ACR
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build and push Docker image
      - name: Build and push Docker image
        run: |
          docker buildx build \
            --push \
            --tag "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" \
            --tag "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest" \
            .

      # Azure login
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Set AKS context
      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      # Deploy to AKS
      - name: Deploy to AKS
        run: |
          kubectl set image "deployment/${AKS_DEPLOYMENT}" \
            "${AKS_CONTAINER}=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" \
            -n "${AKS_NAMESPACE}"
          kubectl rollout status "deployment/${AKS_DEPLOYMENT}" -n "${AKS_NAMESPACE}" --timeout=5m