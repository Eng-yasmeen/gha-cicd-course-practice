nname: Full Docker Artifact Workflow (Max ready Actions)

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  build-artifact:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: tiny-health-app
      ARTIFACT_NAME: tiny-health-app-image

    steps:
      # Checkout repo
      - name: Check out repository
        uses: actions/checkout@v6

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Run Python tests
      - name: Run tests
        run: python -m unittest discover -s tests -v

      # Build + Save Docker image + Upload artifact
      - name: Build, save, and upload Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          outputs: type=tar,name=${{ env.ARTIFACT_NAME }}